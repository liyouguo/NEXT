<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美股性价比分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f5f9;
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.2rem;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .card-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #f1f5f9;
        }

        .card p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
        }

        .card-footer {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #3b82f6;
            font-weight: 600;
        }

        .features {
            margin-top: 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .feature {
            padding: 20px;
            color: #94a3b8;
        }

        .feature strong {
            color: #f1f5f9;
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 美股性价比分析系统</h1>
            <p>专业的美股指数与ETF投资分析工具</p>
        </div>

        <div class="cards">
            <a href="nasdaq.html" class="card">
                <div class="card-icon">📈</div>
                <h2>纳斯达克指数</h2>
                <p>实时追踪纳斯达克综合指数走势，包含收盘价、信号评分等关键指标</p>
                <div class="card-footer">
                    查看详情 →
                </div>
            </a>

            <a href="etf.html" class="card">
                <div class="card-icon">💎</div>
                <h2>ETF上升趋势</h2>
                <p>挖掘处于上升趋势的ETF，包含AI洞察标签和主题分类</p>
                <div class="card-footer">
                    查看详情 →
                </div>
            </a>
        </div>

        <div class="features">
            <div class="feature">
                <strong>🔄 实时数据</strong>
                自动从官方API获取最新数据
            </div>
            <div class="feature">
                <strong>📊 可视化图表</strong>
                直观展示价格趋势与指标变化
            </div>
            <div class="feature">
                <strong>🤖 AI洞察</strong>
                智能标签辅助投资决策
            </div>
        </div>
    </div>
</body>
</html>
