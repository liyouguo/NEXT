<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纳斯达克指数 - 美股性价比分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #f1f5f9;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .nav-back:hover {
            color: #3b82f6;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 0.75rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.loading {
            background: #f59e0b;
        }

        .status-dot.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #94a3b8;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .btn:hover {
            background: rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #3b82f6;
        }

        .stat-value.positive {
            color: #10b981;
        }

        .stat-value.negative {
            color: #ef4444;
        }

        .chart-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .chart-wrapper {
            position: relative;
            height: 500px;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .chart-wrapper {
                height: 350px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">
            ← 返回首页
        </a>

        <div class="header">
            <h1>📈 纳斯达克指数</h1>
            <p>实时追踪纳斯达克综合指数走势</p>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">正在加载数据...</span>
            <span class="status-text" id="updateTime"></span>
        </div>

        <div class="controls">
            <button class="btn" id="chartBtn">📊 信号评分</button>
            <button class="btn" id="refreshBtn">🔄 刷新数据</button>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="chart-container" id="chartContainer" style="display: none;">
            <div class="chart-wrapper">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let chart = null;
        let chartVisible = true;

        function updateStatus(isLoading, isError = false, message = '') {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            dot.className = 'status-dot';
            if (isLoading) {
                dot.classList.add('loading');
                text.textContent = message || '正在加载数据...';
            } else if (isError) {
                dot.classList.add('error');
                text.textContent = message || '数据加载失败';
            } else {
                text.textContent = message || '数据已就绪';
            }
        }

        function updateUpdateTime() {
            const now = new Date();
            document.getElementById('updateTime').textContent = 
                `更新时间: ${now.toLocaleString('zh-CN')}`;
        }

        function toggleChart() {
            const container = document.getElementById('chartContainer');
            const btn = document.getElementById('chartBtn');
            
            chartVisible = !chartVisible;
            
            if (chartVisible) {
                container.style.display = 'block';
                btn.textContent = '📊 隐藏图表';
            } else {
                container.style.display = 'none';
                btn.textContent = '📊 信号评分';
            }
        }

        async function fetchData() {
            updateStatus(true);
            try {
                const response = await fetch('/api/nasdaq/data');
                const result = await response.json();
                
                if (result.success) {
                    updateStatus(false);
                    updateUpdateTime();
                    renderStats(result.data);
                    renderChart(result.data);
                } else {
                    updateStatus(false, true, '数据获取失败');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                updateStatus(false, true, '网络错误');
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '刷新中...';
            
            try {
                const response = await fetch('/api/nasdaq/refresh', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    await fetchData();
                } else {
                    updateStatus(false, true, '刷新失败: ' + result.error);
                }
            } catch (error) {
                console.error('Error refreshing data:', error);
                updateStatus(false, true, '刷新失败');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新数据';
            }
        }

        function renderStats(data) {
            if (!data || data.length === 0) return;
            
            const latest = data[data.length - 1];
            const first = data[0];
            const change = latest.CLOSE - first.CLOSE;
            const changePercent = (change / first.CLOSE * 100).toFixed(2);
            const maxClose = Math.max(...data.map(d => parseFloat(d.CLOSE)));
            const minClose = Math.min(...data.map(d => parseFloat(d.CLOSE)));
            
            const container = document.getElementById('statsGrid');
            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">当前收盘</div>
                    <div class="stat-value">${parseFloat(latest.CLOSE).toLocaleString('zh-CN', {maximumFractionDigits: 2})}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">期间涨跌</div>
                    <div class="stat-value ${changePercent >= 0 ? 'positive' : 'negative'}">
                        ${changePercent >= 0 ? '+' : ''}${changePercent}%
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最高收盘</div>
                    <div class="stat-value">${maxClose.toLocaleString('zh-CN', {maximumFractionDigits: 2})}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最低收盘</div>
                    <div class="stat-value">${minClose.toLocaleString('zh-CN', {maximumFractionDigits: 2})}</div>
                </div>
            `;
        }

        function renderChart(data) {
            if (!data || data.length === 0) return;
            
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }
            
            const labels = data.map(d => d.PDATE);
            const closeData = data.map(d => parseFloat(d.CLOSE));
            const signalData = data.map(d => parseFloat(d.SIGNALSCORE));
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '收盘价',
                            data: closeData,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            yAxisID: 'y'
                        },
                        {
                            label: '信号评分',
                            data: signalData,
                            borderColor: '#f59e0b',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderWidth: 2,
                            fill: false,
                            tension: 0.4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#94a3b8',
                                font: { size: 14 }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#f1f5f9',
                            bodyColor: '#94a3b8',
                            borderColor: 'rgba(148, 163, 184, 0.2)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#94a3b8',
                                maxTicksLimit: 10
                            },
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            ticks: {
                                color: '#94a3b8'
                            },
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            ticks: {
                                color: '#94a3b8'
                            },
                            grid: {
                                drawOnChartArea: false,
                            }
                        }
                    }
                }
            });
        }

        document.getElementById('chartBtn').addEventListener('click', toggleChart);
        document.getElementById('refreshBtn').addEventListener('click', refreshData);

        // 初始化加载数据
        fetchData();
        
        // 每5分钟自动刷新
        setInterval(fetchData, 5 * 60 * 1000);
    </script>
</body>
</html>
