<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金波动分析 - 美股性价比分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #f1f5f9;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .nav-back:hover {
            color: #3b82f6;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b 0%, #ec4899 50%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 0.75rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.loading {
            background: #f59e0b;
        }

        .status-dot.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #94a3b8;
        }

        .level-indicator {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 2rem;
            text-align: center;
        }

        .level-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .level-badge.level-low {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .level-badge.level-medium-low {
            background: linear-gradient(135deg, #34d399, #10b981);
            color: white;
        }

        .level-badge.level-medium {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .level-badge.level-medium-high {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
        }

        .level-badge.level-high {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .level-desc {
            font-size: 1.25rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .signal-text {
            font-size: 1.1rem;
            color: #f59e0b;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 0.5rem;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -10px rgba(245, 158, 11, 0.3);
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .stat-value.up {
            color: #10b981;
        }

        .stat-value.down {
            color: #ef4444;
        }

        .stat-value.neutral {
            color: #94a3b8;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .btn:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }

        .btn.refresh {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.3);
        }

        .btn.refresh:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        .btn.refresh:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.time-range {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.3);
        }

        .btn.time-range:hover {
            background: rgba(245, 158, 11, 0.3);
        }

        .btn.time-range.active {
            background: #f59e0b;
            color: white;
        }

        .interpretation {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .interpretation h3 {
            color: #f59e0b;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .interpretation p {
            color: #cbd5e1;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .interpretation ul {
            margin-left: 1.5rem;
            color: #cbd5e1;
        }

        .interpretation li {
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        /* 基金池相关样式 */
        .fund-pool-section {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 2rem;
        }

        .fund-pool-section h2 {
            color: #f59e0b;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            text-align: center;
        }

        .fund-list {
            width: 100%;
            border-collapse: collapse;
        }

        .fund-list-header {
            display: grid;
            grid-template-columns: 80px 2fr 80px 1.2fr 1.2fr 1.2fr 1.2fr;
            gap: 1rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .fund-list-header > div:nth-child(n+4) {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .fund-list-header > div:nth-child(n+4):hover {
            color: #3b82f6;
        }

        .fund-list-header .sorted-asc::after {
            content: ' ↑';
            color: #10b981;
        }

        .fund-list-header .sorted-desc::after {
            content: ' ↓';
            color: #ef4444;
        }

        .fund-row {
            display: grid;
            grid-template-columns: 80px 2fr 80px 1.2fr 1.2fr 1.2fr 1.2fr;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            align-items: center;
        }

        /* 显示所有统计列 */
        .fund-row > .fund-cell:nth-child(n+4) {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .fund-cell-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }
        
        .fund-stat-label {
            color: #64748b;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .fund-stat-value {
            font-weight: 700;
            font-size: 0.95rem;
        }
        
        .fund-stat-value.up {
            color: #10b981;
        }
        
        .fund-stat-value.down {
            color: #ef4444;
        }

        .fund-row:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .fund-row.active {
            background: rgba(16, 185, 129, 0.1);
            border-left: 3px solid #10b981;
        }

        .fund-cell {
            display: flex;
            align-items: center;
        }

        .fund-cell-code {
            color: #94a3b8;
            font-family: monospace;
            font-size: 1rem;
        }

        .fund-cell-name {
            color: #f1f5f9;
            font-weight: 600;
            font-size: 1rem;
        }

        .fund-cell-level {
            display: flex;
            justify-content: center;
        }

        .fund-level-badge {
            padding: 0.35rem 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
        }

        .fund-level-badge.level-low {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .fund-level-badge.level-medium-low {
            background: rgba(52, 211, 153, 0.2);
            color: #34d399;
        }

        .fund-level-badge.level-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .fund-level-badge.level-medium-high {
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }

        .fund-level-badge.level-high {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .fund-cell-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
        }

        .fund-stat-label {
            color: #64748b;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .fund-stat-value {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .fund-stat-value.up {
            color: #10b981;
        }

        .fund-stat-value.down {
            color: #ef4444;
        }

        .fund-cell-empty {
            color: #64748b;
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .fund-list-header,
            .fund-row {
                grid-template-columns: 80px 1fr;
                grid-auto-flow: row;
                gap: 0.5rem;
            }

            .fund-list-header > div:nth-child(n+3),
            .fund-row > .fund-cell:nth-child(n+3) {
                display: none;
            }

            .fund-row {
                padding: 0.75rem;
            }

            .fund-cell-name {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">
            ← 返回首页
        </a>

        <div class="header">
            <h1>💰 基金波动分析</h1>
            <p>同花顺趋势信号 - RSI 指标分析</p>
        </div>

        <!-- 状态栏已隐藏 -->
        <!-- <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">正在加载数据...</span>
            <span class="status-text" id="updateTime"></span>
        </div> -->

        <!-- 基金池展示区域 -->
        <div class="fund-pool-section" id="fundPoolSection">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin: 0;">📊 基金池波动数据</h2>
                <button class="btn refresh" id="refreshBtn" onclick="refreshData()" style="margin: 0;">🔄 刷新数据</button>
            </div>
            <div class="fund-list">
                <div class="fund-list-header">
                    <div>代码</div>
                    <div>名称</div>
                    <div>RSI</div>
                    <div data-sort="stat0">相似天数</div>
                    <div data-sort="stat1">上涨概率</div>
                    <div data-sort="stat2">平均涨幅</div>
                    <div data-sort="stat3">最大涨幅</div>
                </div>
                <div id="fundGrid"></div>
            </div>
        </div>

        <!-- 单个基金详情已隐藏 -->
        <!-- <div class="level-indicator" id="levelIndicator" style="display: none;">
            <div class="level-badge" id="levelBadge">加载中</div>
            <div class="level-desc" id="levelDesc"></div>
            <div class="signal-text" id="signalText"></div>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="controls">
            <button class="btn time-range active" data-range="Week">近一周</button>
            <button class="btn time-range" data-range="Month">近一月</button>
            <button class="btn time-range" data-range="Year">近一年</button>
            <button class="btn refresh" id="refreshBtn">🔄 刷新数据</button>
        </div>

        <div class="interpretation" id="interpretation" style="display: none;">
            <h3>📊 信号解读</h3>
            <div id="interpretationContent"></div>
        </div> -->
    </div>

    <script>
        let currentTimeRange = 'Month';
        let fundPool = [];
        let fundPoolData = {};
        let selectedFundCode = '';
        let currentSortField = null;
        let currentSortOrder = 'desc';

        // 更新刷新按钮状态
        function updateRefreshButton(isLoading) {
            const btn = document.getElementById('refreshBtn');
            if (btn) {
                if (isLoading) {
                    btn.disabled = true;
                    btn.textContent = '刷新中...';
                } else {
                    btn.disabled = false;
                    btn.textContent = '🔄 刷新数据';
                }
            }
        }

        // 获取基金池列表
        async function fetchFundPool() {
            try {
                const response = await fetch('/api/fund/pool');
                const result = await response.json();
                
                if (result.success) {
                    fundPool = result.data;
                    if (fundPool.length > 0 && !selectedFundCode) {
                        selectedFundCode = fundPool[0].code;
                    }
                    renderFundPool();
                }
            } catch (error) {
                console.error('Error fetching fund pool:', error);
            }
        }

        // 获取批量基金数据
        async function fetchBatchFundData() {
            try {
                const response = await fetch(`/api/fund/batch?timeRange=${currentTimeRange}`);
                const result = await response.json();
                
                console.log('Batch fund data result:', result);
                
                if (result.success) {
                    fundPoolData = result.data;
                    console.log('Fund pool data:', fundPoolData);
                    renderFundPool();
                }
            } catch (error) {
                console.error('Error fetching batch fund data:', error);
            }
        }

        // 刷新数据
        async function refreshData() {
            updateRefreshButton(true);
            try {
                await fetchFundPool();
                await fetchBatchFundData();
            } catch (error) {
                console.error('Error refreshing data:', error);
            } finally {
                updateRefreshButton(false);
            }
        }

        // 选择基金
        function selectFund(code) {
            selectedFundCode = code;
            renderFundPool();
        }

        // 处理表头排序
        function handleHeaderSort(sortField) {
            if (currentSortField === sortField) {
                currentSortOrder = currentSortOrder === 'desc' ? 'asc' : 'desc';
            } else {
                currentSortField = sortField;
                currentSortOrder = 'desc';
            }
            renderFundPool();
            updateSortIndicators();
        }

        // 更新排序指示器
        function updateSortIndicators() {
            document.querySelectorAll('.fund-list-header [data-sort]').forEach(el => {
                el.classList.remove('sorted-asc', 'sorted-desc');
                if (el.getAttribute('data-sort') === currentSortField) {
                    el.classList.add(`sorted-${currentSortOrder}`);
                }
            });
        }

        // 获取排序值
        function getSortValue(fund, sortField) {
            const data = fundPoolData[fund.code];
            if (!data || data.error) return -Infinity;
            
            const statsList = (data.dataList || []).slice(0, 4);
            const statIndex = parseInt(sortField.replace('stat', ''));
            
            if (statIndex < 0 || statIndex >= statsList.length) return -Infinity;
            
            const stat = statsList[statIndex];
            if (!stat) return -Infinity;
            
            let valueStr = stat.value.replace(/[^0-9\.\-]/g, '');
            let value = parseFloat(valueStr);
            
            return isNaN(value) ? -Infinity : value;
        }

        // 渲染基金池
        function renderFundPool() {
            const fundGrid = document.getElementById('fundGrid');
            
            if (!fundPool.length) {
                fundGrid.innerHTML = '<div style="padding:3rem;text-align:center;color:#94a3b8;font-size:1.1rem;">暂无基金数据，请点击刷新按钮</div>';
                return;
            }
            
            let sortedFundPool = [...fundPool];
            if (currentSortField) {
                sortedFundPool.sort((a, b) => {
                    const valA = getSortValue(a, currentSortField);
                    const valB = getSortValue(b, currentSortField);
                    return currentSortOrder === 'desc' ? valB - valA : valA - valB;
                });
            }
            
            fundGrid.innerHTML = sortedFundPool.map(fund => {
                const data = fundPoolData[fund.code];
                let levelClass = 'level-unknown';
                let rsiValue = '-';
                let statsList = [];
                
                if (data && !data.error) {
                    levelClass = data.levelClass || 'level-unknown';
                    rsiValue = data.rsiValue !== undefined ? data.rsiValue : '-';
                    statsList = (data.dataList || []).slice(0, 4);
                }
                
                // 确保有4个统计项
                while (statsList.length < 4) {
                    statsList.push({ title: '-', value: '-', trend: 'neutral' });
                }
                
                return `
                    <div class="fund-row ${selectedFundCode === fund.code ? 'active' : ''}" 
                         onclick="selectFund('${fund.code}')">
                        <div class="fund-cell fund-cell-code">${fund.code}</div>
                        <div class="fund-cell fund-cell-name">${fund.name}</div>
                        <div class="fund-cell fund-cell-level">
                            <span class="fund-level-badge ${levelClass}">${rsiValue}</span>
                        </div>
                        ${statsList.map(stat => `
                            <div class="fund-cell fund-cell-stat">
                                <div class="fund-stat-label">${stat.title}</div>
                                <div class="fund-stat-value ${stat.trend}">${stat.value}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
            
            updateSortIndicators();
        }

        // 初始化
        async function init() {
            document.querySelectorAll('.fund-list-header [data-sort]').forEach(el => {
                el.addEventListener('click', () => {
                    handleHeaderSort(el.getAttribute('data-sort'));
                });
            });
            
            await fetchFundPool();
            await fetchBatchFundData();
        }

        init();
        
        setInterval(async () => {
            await fetchBatchFundData();
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
