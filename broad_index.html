<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宽基指数趋势大模型 - 美股性价比分析系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #f1f5f9;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            text-decoration: none;
            margin-bottom: 2rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .nav-back:hover {
            color: #3b82f6;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 50%, #10b981 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.7);
            border-radius: 0.75rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.loading {
            background: #f59e0b;
        }

        .status-dot.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            color: #94a3b8;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-filter {
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .btn-filter:hover {
            background: rgba(139, 92, 246, 0.3);
        }

        .btn-filter.active {
            background: #8b5cf6;
            color: white;
            border-color: #8b5cf6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }

        .stat-card.extreme-strong .stat-value { color: #ef4444; }
        .stat-card.strong .stat-value { color: #f97316; }
        .stat-card.mild-strong .stat-value { color: #f59e0b; }
        .stat-card.mild-weak .stat-value { color: #3b82f6; }
        .stat-card.weak .stat-value { color: #10b981; }

        .results-section {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .results-count {
            color: #cbd5e1;
            font-size: 1.1rem;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        th {
            background: rgba(15, 23, 42, 0.5);
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        tr:hover {
            background: rgba(30, 41, 59, 0.5);
        }

        .signal-badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .signal-extreme-strong {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .signal-strong {
            background: rgba(249, 115, 22, 0.2);
            color: #fb923c;
            border: 1px solid rgba(249, 115, 22, 0.3);
        }

        .signal-mild-strong {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .signal-mild-weak {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .signal-weak {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: rgba(139, 92, 246, 0.2);
            color: #a78bfa;
            font-weight: 700;
            font-size: 0.875rem;
        }

        .rank-badge.top-3 {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .rank-badge.top-10 {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .category-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            th, td {
                padding: 0.75rem 0.5rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-back">
            ← 返回首页
        </a>

        <div class="header">
            <h1>📉 宽基指数趋势大模型</h1>
            <p>EMA指数移动平均 - 趋势线与偏离率分析</p>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">准备就绪，点击刷新获取数据</span>
            <span class="status-text" id="updateTime"></span>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="refreshBtn">🔄 刷新数据</button>
            <button class="btn btn-filter active" data-category="all">全部</button>
            <button class="btn btn-filter" data-category="A股指数">A股指数</button>
            <button class="btn btn-filter" data-category="宽基ETF">宽基ETF</button>
            <button class="btn btn-filter" data-category="风格ETF">风格ETF</button>
            <button class="btn btn-filter" data-category="跨境ETF">跨境ETF</button>
            <button class="btn btn-filter" data-category="商品ETF">商品ETF</button>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="results-section" id="resultsSection" style="display: none;">
            <div class="results-header">
                <div class="results-count">
                    显示 <strong id="indexCount">0</strong> 个指数/ETF
                </div>
            </div>
            <div class="table-container">
                <table id="indexTable">
                    <thead>
                        <tr>
                            <th>强度</th>
                            <th>指数/ETF</th>
                            <th>分类</th>
                            <th>现价</th>
                            <th>今日涨跌</th>
                            <th>5日涨跌</th>
                            <th>20日涨跌</th>
                            <th>趋势线</th>
                            <th>偏离率</th>
                            <th>信号</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📊</div>
            <p>点击刷新按钮获取宽基指数趋势数据</p>
        </div>
    </div>

    <script>
        let currentData = null;
        let currentCategory = 'all';

        function updateStatus(isLoading, isError = false, message = '') {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            dot.className = 'status-dot';
            if (isLoading) {
                dot.classList.add('loading');
                text.textContent = message || '正在获取数据...';
            } else if (isError) {
                dot.classList.add('error');
                text.textContent = message || '数据获取失败';
            } else {
                text.textContent = message || '数据获取成功';
            }
        }

        function updateUpdateTime(timeStr) {
            document.getElementById('updateTime').textContent = `更新时间: ${timeStr}`;
        }

        function calculateStats(indices) {
            const stats = {
                'extreme-strong': 0,
                'strong': 0,
                'mild-strong': 0,
                'mild-weak': 0,
                'weak': 0
            };

            indices.forEach(idx => {
                const signalClass = idx.signal_class || idx.signalClass;
                if (signalClass === 'signal-extreme-strong') stats['extreme-strong']++;
                else if (signalClass === 'signal-strong') stats['strong']++;
                else if (signalClass === 'signal-mild-strong') stats['mild-strong']++;
                else if (signalClass === 'signal-mild-weak') stats['mild-weak']++;
                else if (signalClass === 'signal-weak') stats['weak']++;
            });

            return stats;
        }

        function renderStatsGrid(stats) {
            const grid = document.getElementById('statsGrid');
            const signalNames = {
                'extreme-strong': '极强',
                'strong': '强势',
                'mild-strong': '偏强',
                'mild-weak': '偏弱',
                'weak': '超卖'
            };

            grid.innerHTML = Object.entries(stats).map(([key, count]) => `
                <div class="stat-card ${key}">
                    <div class="stat-label">${signalNames[key]}</div>
                    <div class="stat-value">${count}</div>
                </div>
            `).join('');
        }

        function getRankClass(rank) {
            if (rank <= 3) return 'top-3';
            if (rank <= 10) return 'top-10';
            return '';
        }

        function renderTable(indices) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('indexCount').textContent = indices.length;

            tbody.innerHTML = indices.map(idx => `
                <tr>
                    <td><span class="rank-badge ${getRankClass(idx.rank)}">${idx.rank}</span></td>
                    <td><strong>${idx.name}</strong></td>
                    <td><span class="category-badge">${idx.category}</span></td>
                    <td>${idx.current_price.toFixed(3)}</td>
                    <td style="color: ${idx.today_change >= 0 ? '#10b981' : '#ef4444'}">
                        ${idx.today_change >= 0 ? '+' : ''}${idx.today_change.toFixed(2)}%
                    </td>
                    <td style="color: ${idx.change_5d >= 0 ? '#10b981' : '#ef4444'}">
                        ${idx.change_5d >= 0 ? '+' : ''}${idx.change_5d.toFixed(2)}%
                    </td>
                    <td style="color: ${idx.change_20d >= 0 ? '#10b981' : '#ef4444'}">
                        ${idx.change_20d >= 0 ? '+' : ''}${idx.change_20d.toFixed(2)}%
                    </td>
                    <td>${idx.trend_line.toFixed(3)}</td>
                    <td style="color: ${idx.deviation >= 0 ? '#10b981' : '#ef4444'}">
                        <strong>${idx.deviation >= 0 ? '+' : ''}${idx.deviation.toFixed(2)}%</strong>
                    </td>
                    <td><span class="signal-badge ${idx.signal_class || idx.signalClass}">${idx.signal}</span></td>
                </tr>
            `).join('');
        }

        function renderData(data) {
            currentData = data;
            
            let filteredIndices = data.indices;
            if (currentCategory !== 'all') {
                filteredIndices = data.indices.filter(idx => idx.category === currentCategory);
            }

            renderStatsGrid(calculateStats(data.indices));
            renderTable(filteredIndices);

            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
        }

        async function fetchData() {
            updateStatus(true, false, '正在获取宽基指数数据...');
            try {
                const response = await fetch('/api/broad_index/data');
                const result = await response.json();
                
                if (result.success) {
                    updateStatus(false, false, '数据获取成功');
                    updateUpdateTime(result.update_time);
                    renderData(result);
                } else {
                    updateStatus(false, true, result.error || '数据获取失败');
                }
            } catch (e) {
                console.error('Error fetching data:', e);
                updateStatus(false, true, '网络错误');
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '刷新中...';
            
            updateStatus(true, false, '正在刷新数据...');
            try {
                const response = await fetch('/api/broad_index/refresh', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    updateStatus(false, false, '数据刷新成功');
                    updateUpdateTime(result.update_time);
                    renderData(result);
                } else {
                    updateStatus(false, true, result.error || '数据刷新失败');
                }
            } catch (e) {
                console.error('Error refreshing data:', e);
                updateStatus(false, true, '网络错误');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新数据';
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', refreshData);

        document.querySelectorAll('.btn-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentCategory = btn.dataset.category;
                if (currentData) {
                    renderData(currentData);
                }
            });
        });

        // 页面加载时获取数据
        fetchData();
    </script>
</body>
</html>
